[build]
builder = "NIXPACKS"
buildCommand = "cd backend && ./mvnw clean package -DskipTests"

[deploy]
startCommand = "cd backend && java -Dspring.profiles.active=production -Dserver.port=$PORT -jar target/vitals-tracker-1.0.0.jar"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[nixpacks]
nixPkgs = ["jdk21"]
